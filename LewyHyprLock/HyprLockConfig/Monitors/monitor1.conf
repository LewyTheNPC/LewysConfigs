##################
### BACKGROUND ###
##################

    background {
            monitor = $monitor1
            path = $backgroundPATH
            color = rgba(0, 0, 0, 1.0)
            blur_passes = 2
            hide_cursor= true
            ignore_empty_input= true
            immediate_render = false
            text_trim = true
            fractional_scaling = 2
            screencopy_mode = 0
    }

#############
### LABEL ###
#############

    ############
    ### TIME ###
    ############

        ############
        ### HOUR ###
        ############

            label {
                monitor = $monitor1
                text = cmd[update:1000] date +"%H"
                color = rgba(180, 55, 80, 1.0)
                font_size = $hourSIZEm1
                font_family = Noto Sans

                position = $hourX, $hourY
                halign = center
                valign = center
            }

        ##############
        ### MINUTE ###
        ##############

            label {
                monitor = $monitor1
                text = cmd[update:1000] date +"%M"
                color = rgba(110, 30, 65, 1.0)
                font_size = $minuteSIZEm1
                font_family = Noto Sans

                position = $minX, $minY
                halign = center
                valign = center
            }

        #############
        ### AM/PM ###
        #############

            label {
                monitor = $monitor1
                text = cmd[update:1000] date +"%p"
                color = rgba(180, 55, 80, 1.0)
                font_size = $ampmSIZEm1
                font_family = Noto Sans

                position = $ampmX, $ampmY
                halign = center
                valign = center
            }

        ###########
        ### DAY ###
        ###########

            label {
                monitor = $monitor1
                text = cmd[update:1000] date +"%A"
                color = rgba(145, 40, 75, 1.0)
                font_size = $daySIZEm1
                font_family = Noto Sans

                position = $dayX, $dayY
                halign = center
                valign = center
            }

        ############
        ### DATE ###
        ############

            label {
                monitor = $monitor1
                text = cmd[update:1000] date +"%d.%m.%Y"
                color = rgba(145, 40, 75, 1.0)
                font_size = $dateSIZEm1
                font_family = Noto Sans

                position = $dateX, $dateY
                halign = center
                valign = center
            }

    ######################
    ### Battery LABELS ###
    ######################

        label {
            monitor = $monitor1
            text = cmd[update:1000] upower -i $(upower -e | grep 'BAT') | grep -E "percentage" | awk '{print $2}'
            color = rgba(145, 40, 75, 1.0)
            font_size = $batteryTextSIZEm1
            font_family = Noto Sans

            position = $batteryTextX, 0
            halign = left
            valign = top
        }

    #######################
    ### BOOKMARK LABELS ###
    #######################

        #########
        ### + ###
        #########

            label {
                monitor = $monitor1
                text = +
                color = rgba(255, 255, 255, 1.0)
                font_size = $plusSIZEm1
                font_family = Noto Sans

                position = $bookmarkXPlusText, $bookmarkYPlusText
                halign = left
                valign = top
                rotate = 45
                zindex = 1
            }

        ###########
        ### BTW ###
        ###########

            label {
                monitor = $monitor1
                text = BTW
                color = rgba(255, 255, 255, 1.0)
                font_size = $btwSIZEm1
                font_family = Noto Sans

                position = $bookmarkXBTWText, $bookmarkYBTWText
                halign = left
                valign = top
                rotate = 90
                zindex = 1
            }

##############
### IMAGES ###
##############

    ############
    ### TETO ###
    ############

        image {
            monitor = $monitor1
            path = $tetoPATH
            size = $tetoSIZEm1
            rounding = 0
            border_size = 0

            position = 0, $tetoY
            halign = center
            valign = center
        }

    ############
    ### MIKU ###
    ############

        ############
        ### MIKU ###
        ############

            image {
                monitor = $monitor1
                path = $mikuPATH
                size = $mikuSIZEm1
                rounding = 0
                border_size = 0

                position = $mikuX, $mikuY
                halign = left
                valign = bottom
                rotate = -45
                zindex = 0
            }

        ###########
        ### BOX ###
        ###########

            image {
                monitor = $monitor1
                path = $boxPATH
                size = $boxSIZEm1
                rounding = 0
                border_size = 0

                position = $boxX, $boxY
                halign = left
                valign = bottom
                rotate = -45
                zindex = 1
            }

    ###########
    ### CAT ###
    ###########

        ###########
        ### CAT ###
        ###########

            image {
                monitor = $monitor1
                path = $catPATH
                size = $catSIZEm1
                rounding = 0
                border_size = 0

                position = $catX, $catY
                halign = right
                valign = center
                rotate = 70
            }

        ############
        ### WOOL ###
        ############

            image {
                monitor = $monitor1
                path = $woolPATH
                size = $woolSIZEm1
                rounding = 0
                border_size = 0

                position = $woolX, $woolY
                halign = right
                valign = top
                rotate = -80
            }

    ############
    ### LOCK ###
    ############

        image {
            monitor = $monitor1
            path = $lockPATH
            size = $lockSIZEm1
            rounding = 0
            border_size = 0

            position = 0, $lockY
            halign = center
            valign = bottom
        }

    ###############
    ### BATTERY ###
    ###############

        image {
            monitor = $monitor1
            path = $batteryTempImagePATH
            size = $batterySIZEm1
            rounding = 0
            border_size = 0

            reload_time = 1
            reload_cmd = $updateBatteryImageScriptPATH
            position = 0, 0
            halign = left
            valign = top
        }

    ################
    ### BOOKMARK ###
    ################

        ################
        ### BOOKMARK ###
        ################

            image {
                monitor = $monitor1
                path = $bookmarkPATH
                size = $bookmarkSIZEm1
                rounding = 0
                border_size = 0

                position = $bookmarkX, $bookmarkY
                halign = left
                valign = top
                rotate = 90
                zindex = 0
            }

        ################
        ### HYPRLOGO ###
        ################

            image {
                monitor = $monitor1
                path = $hyprLogoPATH
                size = $hyprLogoSIZEm1
                rounding = 0
                border_size = 0

                position = $bookmarkXHyprLogo, $bookmarkYLogo
                halign = left
                valign = top
                zindex = 1
            }

        ################
        ### ARCHLOGO ###
        ################

            image {
                monitor = $monitor1
                path = $archLogoPATH
                size = $archLogoSIZEm1
                rounding = 0
                border_size = 0

                position = $bookmarkXArchLogo, $bookmarkYLogo
                halign = left
                valign = top
                zindex = 1
            }

#############
### SHAPE ###
#############

    shape {
        monitor = $monitor1
        size = 0, $clockShapeSIZEYm1
        color = rgba(0, 0, 0, 0.0) # no fill
        rounding = 0
        border_size = $clockShapeBORDERSIZEm1
        border_color = rgba(145, 40, 75, 1.0)

        position = 0, $clockShapeY
        halign = center
        valign = top
    }

#############
### INPUT ###
#############

    ################
    ### PASSWORD ###
    ################

        input-field {
            monitor = $monitor1
            size = 20%, 5%
            outline_thickness = 10
            inner_color = rgba(150, 55, 80, 1)
            outer_color = rgba(231, 55, 100, 1) rgba(231, 55, 100, 1)

            check_color = rgba(0, 255, 0, 1)
            check_text = Checking
            fail_color = rgba(255, 0, 0, 1)

            font_color = rgb(231, 55, 100)
            fade_on_empty = false
            rounding = 20

            position = 0, $loginY
            halign = center
            valign = center
        }
